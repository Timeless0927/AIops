services:
  gateway:
    image: aiops-gateway:smoke
    build:
      context: .
      dockerfile: Dockerfile.aiops
      target: gateway
    environment:
      AIOPS_GATEWAY_HOST: 0.0.0.0
      AIOPS_GATEWAY_PORT: "8080"
      AIOPS_CONNECTOR_URL: http://connector:8081
      AIOPS_HERMES_URL: http://hermes:8082
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  connector:
    image: aiops-connectors:smoke
    build:
      context: .
      dockerfile: Dockerfile.aiops
      target: connectors
    environment:
      AIOPS_CONNECTOR_HOST: 0.0.0.0
      AIOPS_CONNECTOR_PORT: "8081"
      AIOPS_CONNECTOR_ID: smoke-connector
      AIOPS_CLUSTER_ID: smoke-cluster
      AIOPS_NAMESPACE_SCOPE: default
      AIOPS_CONNECTOR_CAPABILITIES: health,validate
      AIOPS_GATEWAY_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  hermes:
    image: aiops-hermes:smoke
    build:
      context: .
      dockerfile: Dockerfile.aiops
      target: hermes-smoke
    environment:
      AIOPS_HERMES_HOST: 0.0.0.0
      AIOPS_HERMES_PORT: "8082"
      AIOPS_GATEWAY_URL: http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  smoke:
    image: aiops-hermes:smoke
    build:
      context: .
      dockerfile: Dockerfile.aiops
      target: hermes-smoke
    command: ["python3", "-m", "runtime.service_mesh_smoke"]
    environment:
      AIOPS_SMOKE_GATEWAY_URL: http://gateway:8080
      AIOPS_SMOKE_HERMES_URL: http://hermes:8082
      AIOPS_SMOKE_CONNECTOR_URL: http://connector:8081
    depends_on:
      gateway:
        condition: service_healthy
      connector:
        condition: service_healthy
      hermes:
        condition: service_healthy
