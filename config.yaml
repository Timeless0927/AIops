# AIOps SRE Agent 基础配置模板。
# Hermes 实际运行时默认读取 ~/.hermes/config.yaml，当前文件作为项目内基线配置保留。

model:
  default: "claude-sonnet-4-20250514"
  provider: "anthropic"

toolsets:
  - hermes-cli

custom_toolsets:
  sre:
    - terminal
    - file
    - skills

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  persistent_shell: true

agent:
  max_turns: 60

providers: {}

sre:
  project_root: "/home/mao/aiops"
  toolsets_dir: "/home/mao/aiops/toolsets"
  skills_dir: "/home/mao/aiops/skills"
  hooks_dir: "/home/mao/aiops/hooks"
  dedup_key_version: "v1"
  raw_output_ttl_hours: 24
  system_mode_store: "sqlite"

platforms:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    main_chat_id: "${FEISHU_MAIN_CHAT_ID}"
    approval:
      enabled: false
      approval_code: "${FEISHU_APPROVAL_CODE}"
      user_id_type: "open_id"
      callback_path: "/webhooks/feishu/approval"
      polling_enabled: false
      polling_interval_seconds: 60
      polling_batch_size: 50

sre_permissions:
  operators:
    - name: "管理员"
      platform: "feishu"
      platform_user_id: "ou_placeholder_admin"
      role: "admin"
      namespaces: ["*"]
      allowed_tools: ["k8s_read", "k8s_write", "k8s_exec"]
      can_approve: true
    - name: "本地测试审批人"
      platform: "feishu"
      platform_user_id: "ou_placeholder_local_test"
      role: "admin"
      namespaces: ["*"]
      allowed_tools: ["k8s_read", "k8s_write", "k8s_exec"]
      can_approve: true
    - name: "运维员"
      platform: "feishu"
      platform_user_id: "ou_placeholder_operator"
      role: "operator"
      namespaces: ["default", "staging"]
      allowed_tools: ["k8s_read", "k8s_write"]
      can_approve: false

  approval_rules:
    - tool: "k8s_exec"
      require_approval_from: "admin"
    - tool: "k8s_write"
      namespace: "production"
      require_approval_from: "admin"
    - tool: "k8s_write"
      command_match: "delete"
      require_approval_from: "admin"
    - tool: "k8s_write"
      namespace: "staging"
      auto_approve: true

stt:
  enabled: true
  provider: "local"
  model: "base"
  language: "zh"

tts:
  provider: "edge"
  voice: "zh-CN-YunxiNeural"
  rate: "+10%"
  auto_reply_voice: true

notification:
  severity_filter: "warning"
  dedup_window: 14400
  reopen_window_seconds: 3600
  storm_threshold_per_minute: 60
  daily_digest: "09:00"
  quiet_hours:
    start: "23:00"
    end: "07:00"
    except: "critical"
  max_per_hour: 10

fallback_rules:
  - alert: "KubePodCrashLooping"
    action: "kubectl describe pod {pod} -n {namespace} && kubectl logs {pod} -n {namespace} --tail=100"
    deliver: "origin"
  - alert: "NodeNotReady"
    action: "kubectl describe node {node} && kubectl get events --field-selector involvedObject.name={node}"
    deliver: "origin"
  - default:
    action: "forward_raw"

health:
  heartbeat_interval: 300
  heartbeat_channel: "ops"
  max_missed_heartbeats: 3
