model:
  default: "${AIOPS_MODEL_NAME}"
  provider: "${AIOPS_MODEL_PROVIDER}"
  base_url: "${AIOPS_MODEL_BASE_URL}"
  api_key: "${AIOPS_MODEL_API_KEY}"

providers: {}
fallback_providers: []

toolsets:
  - hermes-cli
  - sre
  - k8s

platform_toolsets:
  feishu:
    - hermes-feishu
    - sre
    - k8s

agent:
  max_turns: ${AIOPS_AGENT_MAX_TURNS}

terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true

sre:
  project_root: "/app"
  toolsets_dir: "/app/toolsets"
  hooks_dir: "/app/hooks"
  skills_dir: "/app/skills"
  dedup_key_version: "v1"
  raw_output_ttl_hours: 24
  system_mode_store: "sqlite"

platforms:
  feishu:
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
    encrypt_key: "${FEISHU_ENCRYPT_KEY}"
    main_chat_id: "${FEISHU_MAIN_CHAT_ID}"
    default_group_policy: "${FEISHU_GROUP_POLICY}"
    approval:
      enabled: ${FEISHU_APPROVAL_ENABLED}
      approval_code: "${FEISHU_APPROVAL_CODE}"
      requester_open_id: "${FEISHU_APPROVAL_REQUESTER_OPEN_ID}"
      user_id_type: "open_id"
      callback_path: "/webhooks/feishu/approval"
      polling_enabled: ${FEISHU_APPROVAL_POLLING_ENABLED}
      polling_interval_seconds: 60
      polling_batch_size: 50

sre_permissions:
  operators:
    - name: "${AIOPS_SRE_ADMIN_NAME}"
      platform: "feishu"
      platform_user_id: "${AIOPS_SRE_ADMIN_OPEN_ID}"
      role: "admin"
      namespaces: ["*"]
      allowed_tools: ["k8s_read", "k8s_write", "k8s_exec"]
      can_approve: true
    - name: "${AIOPS_SRE_OPERATOR_NAME}"
      platform: "feishu"
      platform_user_id: "${AIOPS_SRE_OPERATOR_OPEN_ID}"
      role: "operator"
      namespaces: ["default", "staging"]
      allowed_tools: ["k8s_read", "k8s_write"]
      can_approve: false

  approval_policy:
    allow_self_approval_low_risk: ${AIOPS_APPROVAL_ALLOW_SELF_APPROVAL_LOW_RISK}
    require_admin_for_exec: ${AIOPS_APPROVAL_REQUIRE_ADMIN_FOR_EXEC}
    require_admin_for_dangerous: ${AIOPS_APPROVAL_REQUIRE_ADMIN_FOR_DANGEROUS}

  approval_rules:
    - tool: "k8s_exec"
      require_approval_from: "admin"
    - tool: "k8s_write"
      namespace: "production"
      require_approval_from: "admin"
    - tool: "k8s_write"
      command_match: "delete"
      require_approval_from: "admin"
    - tool: "k8s_write"
      namespace: "staging"
      auto_approve: true
