apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aiops-dev
commonAnnotations:
  aiops.dev/image-source-head: "fb9371efd1f63c1a329b93530efc4e7f7dd436d5"
  aiops.dev/image-source-run: "https://github.com/Timeless0927/AIops/actions/runs/27429191066"
  aiops.dev/image-source-short-sha: "fb9371e"
resources:
  - namespace.yaml
  - ../../base
  - ../../bundled
patches:
  - target:
      kind: ConfigMap
      name: aiops-runtime-config
    patch: |-
      - op: replace
        path: /data/PROMETHEUS_URL
        value: "http://aiops-dev-prometheus:9090"
      - op: replace
        path: /data/LOKI_URL
        value: "http://aiops-dev-loki:3100"
      - op: replace
        path: /data/AIOPS_CONNECTOR_URL
        value: "http://aiops-connector:8081"
      - op: replace
        path: /data/AIOPS_GATEWAY_URL
        value: "http://aiops-gateway:8080"
      - op: replace
        path: /data/AIOPS_TOPOLOGY_MCP_URL
        value: "http://aiops-mcp-topology:8085"
      - op: replace
        path: /data/AIOPS_CLUSTER_ID
        value: "rc-bundled-digest"
      - op: replace
        path: /data/AIOPS_NAMESPACE_SCOPE
        value: "aiops-dev"
  - target:
      kind: ConfigMap
      name: aiops-dev-prometheus-config
    patch: |-
      - op: replace
        path: /data/prometheus.yml
        value: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - aiops-dev
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: "(.+)"
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: app
  - target:
      kind: Deployment
      name: aiops-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-gateway@sha256:e50aa0b203822a060ffd14df55552672c1f3ef7b401b43fe5b7f9deb55e2f160"
  - target:
      kind: Deployment
      name: aiops-connector
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-connectors@sha256:40a5fe5aa86c9f26b0da1d096f84a333c710c4712615dac4db7f4657e98b0843"
  - target:
      kind: Deployment
      name: aiops-hermes
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-hermes@sha256:68b3e69b496d1e0257f76285e5f67bdb3f603bef64a940d8e0d8cb2e47cc66bb"
  - target:
      kind: Deployment
      name: aiops-mcp-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:914b068b6aa89dadc90cde153c25227fc1ff093200fa7f80e0c0505605e8c3b1"
  - target:
      kind: Deployment
      name: aiops-mcp-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:25e63390491b818f55cf9d278a5e295af457150d2832cb88f0e2720840d9c8a5"
  - target:
      kind: Deployment
      name: aiops-mcp-topology
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-topology@sha256:892577892760a5bbf5b9c839889e18575ca0baff7fc3c04972bf92677497a1b4"
  - target:
      kind: Deployment
      name: aiops-dev-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:914b068b6aa89dadc90cde153c25227fc1ff093200fa7f80e0c0505605e8c3b1"
  - target:
      kind: Deployment
      name: aiops-dev-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:25e63390491b818f55cf9d278a5e295af457150d2832cb88f0e2720840d9c8a5"
  - target:
      kind: Deployment
      name: payment-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:914b068b6aa89dadc90cde153c25227fc1ff093200fa7f80e0c0505605e8c3b1"
  - target:
      kind: Job
      name: aiops-loki-synthetic-log
    patch: |-
      - op: replace
        path: /metadata/name
        value: "aiops-loki-synthetic-log-rc-fb9371e"
      - op: replace
        path: /metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-fb9371e"
      - op: replace
        path: /spec/template/metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-fb9371e"
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:25e63390491b818f55cf9d278a5e295af457150d2832cb88f0e2720840d9c8a5"
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          import json, os, time, urllib.request
          payload = {
              "streams": [
                  {
                      "stream": {"app": "payment-api", "namespace": "aiops-dev", "source": "aiops-rc-bundled-digest"},
                      "values": [[str(time.time_ns()), "payment-api rc digest synthetic checkout error"]],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["LOKI_PUSH_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=10).read()
