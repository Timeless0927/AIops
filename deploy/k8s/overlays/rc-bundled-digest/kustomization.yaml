apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aiops-dev
commonAnnotations:
  aiops.dev/image-source-head: "9f9aafd941cb47b61a955ecb8f868e7a53b5c77d"
  aiops.dev/image-source-run: "https://github.com/Timeless0927/AIops/actions/runs/27344249151"
  aiops.dev/image-source-short-sha: "9f9aafd"
resources:
  - namespace.yaml
  - ../../base
  - ../../bundled
patches:
  - target:
      kind: ConfigMap
      name: aiops-runtime-config
    patch: |-
      - op: replace
        path: /data/PROMETHEUS_URL
        value: "http://aiops-dev-prometheus:9090"
      - op: replace
        path: /data/LOKI_URL
        value: "http://aiops-dev-loki:3100"
      - op: replace
        path: /data/AIOPS_CONNECTOR_URL
        value: "http://aiops-connector:8081"
      - op: replace
        path: /data/AIOPS_GATEWAY_URL
        value: "http://aiops-gateway:8080"
      - op: replace
        path: /data/AIOPS_CLUSTER_ID
        value: "rc-bundled-digest"
      - op: replace
        path: /data/AIOPS_NAMESPACE_SCOPE
        value: "aiops-dev"
  - target:
      kind: ConfigMap
      name: aiops-dev-prometheus-config
    patch: |-
      - op: replace
        path: /data/prometheus.yml
        value: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - aiops-dev
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: "(.+)"
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: app
  - target:
      kind: Deployment
      name: aiops-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-gateway@sha256:5c16f49e64df93199397395c32d055e5bdc7b03f802fe79ffcfb3e417130a9f6"
  - target:
      kind: Deployment
      name: aiops-connector
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-connectors@sha256:b5b50502628a38ddc170c50fb73180487bf31d15bcf200da42c2d7a35310403e"
  - target:
      kind: Deployment
      name: aiops-hermes
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-hermes@sha256:b88d7557b5491d0178126c5643cc5795e8e47dabbdef978f3e68c473e66504a0"
  - target:
      kind: Deployment
      name: aiops-mcp-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:81589cb7eb50e0f244fdef1ed202fca189fa5d11e4f337f602d0fdb5c32d27bc"
  - target:
      kind: Deployment
      name: aiops-mcp-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:2e38540cdd0c9ad6e552090072fd1adf5a38d6e347c32b31a2b256334f2e699b"
  - target:
      kind: Deployment
      name: aiops-dev-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:81589cb7eb50e0f244fdef1ed202fca189fa5d11e4f337f602d0fdb5c32d27bc"
  - target:
      kind: Deployment
      name: aiops-dev-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:2e38540cdd0c9ad6e552090072fd1adf5a38d6e347c32b31a2b256334f2e699b"
  - target:
      kind: Deployment
      name: payment-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus@sha256:81589cb7eb50e0f244fdef1ed202fca189fa5d11e4f337f602d0fdb5c32d27bc"
  - target:
      kind: Job
      name: aiops-loki-synthetic-log
    patch: |-
      - op: replace
        path: /metadata/name
        value: "aiops-loki-synthetic-log-rc-9f9aafd"
      - op: replace
        path: /metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-9f9aafd"
      - op: replace
        path: /spec/template/metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-9f9aafd"
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki@sha256:2e38540cdd0c9ad6e552090072fd1adf5a38d6e347c32b31a2b256334f2e699b"
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          import json, os, time, urllib.request
          payload = {
              "streams": [
                  {
                      "stream": {"app": "payment-api", "namespace": "aiops-dev", "source": "aiops-rc-bundled-digest"},
                      "values": [[str(time.time_ns()), "payment-api rc digest synthetic checkout error"]],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["LOKI_PUSH_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=10).read()
