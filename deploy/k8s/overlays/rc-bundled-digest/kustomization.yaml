apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aiops-dev
commonAnnotations:
  aiops.dev/image-source-head: "fab2e7c15eea5a0cfc334485bbcd8ef3d4230dee"
  aiops.dev/image-source-run: "https://github.com/Timeless0927/AIops/actions/runs/27186194841"
  aiops.dev/image-source-short-sha: "fab2e7c"
resources:
  - namespace.yaml
  - ../../base
  - ../../bundled
patches:
  - target:
      kind: ConfigMap
      name: aiops-runtime-config
    patch: |-
      - op: replace
        path: /data/PROMETHEUS_URL
        value: "http://aiops-dev-prometheus:9090"
      - op: replace
        path: /data/LOKI_URL
        value: "http://aiops-dev-loki:3100"
      - op: replace
        path: /data/AIOPS_CONNECTOR_URL
        value: "http://aiops-connector:8081"
      - op: replace
        path: /data/AIOPS_GATEWAY_URL
        value: "http://aiops-gateway:8080"
      - op: replace
        path: /data/AIOPS_CLUSTER_ID
        value: "rc-bundled-digest"
      - op: replace
        path: /data/AIOPS_NAMESPACE_SCOPE
        value: "aiops-dev"
  - target:
      kind: ConfigMap
      name: aiops-dev-prometheus-config
    patch: |-
      - op: replace
        path: /data/prometheus.yml
        value: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - aiops-dev
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: "(.+)"
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: app
  - target:
      kind: Deployment
      name: aiops-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:61be8a4d8934ca0f4252eddb8e79557bbe7222c2b085ef9104746ba42f37bfc2"
  - target:
      kind: Deployment
      name: aiops-connector
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:b9f4026bf53c9c27eb68d7cae12208598ea465f8993815c72a754fed53764b2c"
  - target:
      kind: Deployment
      name: aiops-hermes
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:ab377cc1e8c8ca9c6a78fa46af98de6502f3aa4587d98e9c946a8bbf0c527e17"
  - target:
      kind: Deployment
      name: aiops-mcp-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:6296a7e599aec9cbb5eda77dc8bfad83255d5a2aafd6f9c120ee8e6493976cd0"
  - target:
      kind: Deployment
      name: aiops-mcp-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:7c867233d11eb16d0fd6560547e2f9080d8faa2bb8c5e9cd69633c27c6dc8ed3"
  - target:
      kind: Deployment
      name: aiops-dev-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:6296a7e599aec9cbb5eda77dc8bfad83255d5a2aafd6f9c120ee8e6493976cd0"
  - target:
      kind: Deployment
      name: aiops-dev-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:7c867233d11eb16d0fd6560547e2f9080d8faa2bb8c5e9cd69633c27c6dc8ed3"
  - target:
      kind: Deployment
      name: payment-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:6296a7e599aec9cbb5eda77dc8bfad83255d5a2aafd6f9c120ee8e6493976cd0"
  - target:
      kind: Job
      name: aiops-loki-synthetic-log
    patch: |-
      - op: replace
        path: /metadata/name
        value: "aiops-loki-synthetic-log-rc-fab2e7c"
      - op: replace
        path: /metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-fab2e7c"
      - op: replace
        path: /spec/template/metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc-fab2e7c"
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:7c867233d11eb16d0fd6560547e2f9080d8faa2bb8c5e9cd69633c27c6dc8ed3"
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          import json, os, time, urllib.request
          payload = {
              "streams": [
                  {
                      "stream": {"app": "payment-api", "namespace": "aiops-dev", "source": "aiops-rc-bundled-digest"},
                      "values": [[str(time.time_ns()), "payment-api rc digest synthetic checkout error"]],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["LOKI_PUSH_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=10).read()
