apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aiops-dev
commonAnnotations:
  aiops.dev/image-source-head: "751ad23453eb329d5412dcec9054993ae306dfdd"
  aiops.dev/image-source-run: "https://github.com/Timeless0927/AIops/actions/runs/27185187112"
  aiops.dev/image-source-short-sha: "751ad23"
resources:
  - namespace.yaml
  - ../../base
  - ../../bundled
patches:
  - target:
      kind: ConfigMap
      name: aiops-runtime-config
    patch: |-
      - op: replace
        path: /data/PROMETHEUS_URL
        value: "http://aiops-dev-prometheus:9090"
      - op: replace
        path: /data/LOKI_URL
        value: "http://aiops-dev-loki:3100"
      - op: replace
        path: /data/AIOPS_CONNECTOR_URL
        value: "http://aiops-connector:8081"
      - op: replace
        path: /data/AIOPS_GATEWAY_URL
        value: "http://aiops-gateway:8080"
      - op: replace
        path: /data/AIOPS_CLUSTER_ID
        value: "rc-bundled-digest"
      - op: replace
        path: /data/AIOPS_NAMESPACE_SCOPE
        value: "aiops-dev"
  - target:
      kind: ConfigMap
      name: aiops-dev-prometheus-config
    patch: |-
      - op: replace
        path: /data/prometheus.yml
        value: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - aiops-dev
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: "(.+)"
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: replace
                  target_label: app
  - target:
      kind: Deployment
      name: aiops-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:9ce8bfc5eb1aa3cacc29141414193731f709e98554b9d74fb80a5b37a779e98d"
  - target:
      kind: Deployment
      name: aiops-connector
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:282c1f9b1f7b6219779d1352250d6ccbee9d32c9eeb019c365895ae54ea95218"
  - target:
      kind: Deployment
      name: aiops-hermes
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:7e5faf6a95e4c8f18a0e9499e9a56b7e0299ff3924bce2ac1d9cafedee17af29"
  - target:
      kind: Deployment
      name: aiops-mcp-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:48a2eea41e7ac584fcb2cf8b6d017f3b48ab1bea7eba578f718f78c997b19149"
  - target:
      kind: Deployment
      name: aiops-mcp-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:9ff447468425f3d94316ab255296a8768a297269ad460d7a806c48081e7372b7"
  - target:
      kind: Deployment
      name: aiops-dev-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:48a2eea41e7ac584fcb2cf8b6d017f3b48ab1bea7eba578f718f78c997b19149"
  - target:
      kind: Deployment
      name: aiops-dev-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:9ff447468425f3d94316ab255296a8768a297269ad460d7a806c48081e7372b7"
  - target:
      kind: Deployment
      name: payment-api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:48a2eea41e7ac584fcb2cf8b6d017f3b48ab1bea7eba578f718f78c997b19149"
  - target:
      kind: Job
      name: aiops-loki-synthetic-log
    patch: |-
      - op: replace
        path: /metadata/name
        value: "aiops-loki-synthetic-log-rc"
      - op: replace
        path: /metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc"
      - op: replace
        path: /spec/template/metadata/labels/app.kubernetes.io~1name
        value: "aiops-loki-synthetic-log-rc"
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/hub@sha256:9ff447468425f3d94316ab255296a8768a297269ad460d7a806c48081e7372b7"
      - op: replace
        path: /spec/template/spec/containers/0/command/2
        value: |
          import json, os, time, urllib.request
          payload = {
              "streams": [
                  {
                      "stream": {"app": "payment-api", "namespace": "aiops-dev", "source": "aiops-rc-bundled-digest"},
                      "values": [[str(time.time_ns()), "payment-api rc digest synthetic checkout error"]],
                  }
              ]
          }
          request = urllib.request.Request(
              os.environ["LOKI_PUSH_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=10).read()
