apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aiops-dev
resources:
  - namespace.yaml
  - ../../base
patches:
  - target:
      kind: ConfigMap
      name: aiops-runtime-config
    # ISSUE-C (ADR-0005): dev-external 指向已存在的观测后端,默认按集群内稳定 Service 名兜底。
      # 真实生产/预发要改成「实际有数据」的后端(含跨 namespace 的全量 Prometheus/Loki),
      # 否则诊断采集拿不到 evidence,只会得到 backend_unavailable 且评测集沉淀的现场为空。
    patch: |-
      - op: replace
        path: /data/PROMETHEUS_URL
        value: "http://prometheus-stack-kube-prom-prometheus.loki.svc.cluster.local:9090"
        # ^ 实际有数据的 Prometheus 集群入口;改成本集群可查到目标 namespace 指标的 URL。
      - op: replace
        path: /data/LOKI_URL
        value: "http://loki.loki.svc.cluster.local:3100"
        # ^ 实际有数据的 Loki 集群入口;改成本集群能采到目标 namespace 日志流的 URL。
      - op: replace
        path: /data/AIOPS_CONNECTOR_URL
        value: "http://aiops-connector:8081"
      - op: replace
        path: /data/AIOPS_GATEWAY_URL
        value: "http://aiops-gateway:8080"
      - op: replace
        path: /data/AIOPS_CLUSTER_ID
        value: "dev-external"
      # ADR-0003 replay campaign: 真 LLM provider = DeepSeek 官方 OpenAI-compatible 端点。
      # model deepseek-v4-flash 已 live curl 验证支持 tool-use(child-1 provider 调用层所需)。
      # API key 不进 git —— 走集群 live secret aiops-runtime-secret(见部署脚本 patch),不入 overlay。
      - op: replace
        path: /data/AIOPS_MODEL_PROVIDER
        value: "custom"
      - op: replace
        path: /data/AIOPS_MODEL_NAME
        value: "deepseek-v4-flash"
      - op: replace
        path: /data/AIOPS_MODEL_BASE_URL
        value: "https://api.deepseek.com/v1"
      - op: replace
        path: /data/AIOPS_NAMESPACE_SCOPE
        # ISSUE-C (ADR-0005): 放开到「要诊断」的 namespace,不要锁在 AIOps 自己的 aiops-dev。
        # 多个目标用逗号分隔。Connector 只对这里列出的 namespace 做 K8s 证据采集(RBAC 也只到这些 namespace),
        # 因此这里必须覆盖真实诊断目标,否则采集空跑、评测集现场缺失。
        # ADR-0003 campaign: 保留 aiops-dev(平台自身诊断),新增 demo-apps(诊断目标业务 ns)。
        # parse_csv 支持逗号分隔多 ns,Connector SA 在 aiops-dev,demo-apps 有 RoleBinding 指回该 SA。
        value: "aiops-dev,demo-apps"
  # ADR-0003 campaign: pin all AIOps service images to the ADR-0003 build tag :5d5b27e.
  # Cluster was running stale :latest (digest 87e55646...) from a pre-ADR-0003 build — the
  # children's LLM tool-use brain + diagnosis_trace/cost_records schema + provider layer
  # were never built/deployed. base deployment pins imagePullPolicy: IfNotPresent, so a
  # bare `:latest` restart never re-pulled. Pinning the explicit GH Actions sha tag forces
  # the correct image. (Tag :5d5b27e published by run 28429405680; run 28426204893 was the
  # first ADR-0003 build :03dfc75 which hit the ProviderConfig.chat_with_tools seam bug.)
  - target:
      kind: Deployment
      name: aiops-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-gateway:5d5b27e"
  - target:
      kind: Deployment
      name: aiops-connector
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-connectors:5d5b27e"
  - target:
      kind: Deployment
      name: aiops-hermes
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-hermes:5d5b27e"
  - target:
      kind: Deployment
      name: aiops-mcp-prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-prometheus:5d5b27e"
  - target:
      kind: Deployment
      name: aiops-mcp-loki
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-loki:5d5b27e"
  - target:
      kind: Deployment
      name: aiops-mcp-topology
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: "registry.cn-hangzhou.aliyuncs.com/timelessmao/aiops-mcp-topology:5d5b27e"
