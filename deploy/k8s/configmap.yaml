apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-agent-config
  namespace: aiops
data:
  FEISHU_MAIN_CHAT_ID: "oc_replace_me"
  FEISHU_GROUP_POLICY: "open"
  FEISHU_ALLOWED_USERS: ""
  AIOPS_MODEL_PROVIDER: "custom"
  AIOPS_MODEL_NAME: "gpt-5.4"
  AIOPS_MODEL_BASE_URL: "http://model-service.default.svc.cluster.local/v1"
  AIOPS_AGENT_MAX_TURNS: "90"
  AIOPS_WEBHOOK_HOST: "0.0.0.0"
  AIOPS_WEBHOOK_PORT: "8765"
  HERMES_HOME: "/data/hermes"
  HERMES_CONFIG: "/data/hermes/config.yaml"
  AIOPS_DATA_DIR: "/data/aiops"
  AIOPS_SRE_ADMIN_NAME: "管理员"
  AIOPS_SRE_ADMIN_OPEN_ID: "ou_replace_me_admin"
  AIOPS_SRE_OPERATOR_NAME: "运维员"
  AIOPS_SRE_OPERATOR_OPEN_ID: "ou_replace_me_operator"
  AIOPS_APPROVAL_ALLOW_SELF_APPROVAL_LOW_RISK: "false"
  AIOPS_APPROVAL_REQUIRE_ADMIN_FOR_EXEC: "true"
  AIOPS_APPROVAL_REQUIRE_ADMIN_FOR_DANGEROUS: "true"
