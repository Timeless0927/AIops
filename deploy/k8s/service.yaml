apiVersion: v1
kind: Service
metadata:
  name: aiops-gateway
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-gateway
    app.kubernetes.io/part-of: aiops-sre-agent
spec:
  selector:
    app.kubernetes.io/name: aiops-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
