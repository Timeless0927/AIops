apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-gateway
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-gateway
    app.kubernetes.io/part-of: aiops-sre-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-gateway
        app.kubernetes.io/part-of: aiops-sre-agent
    spec:
      containers:
        - name: gateway
          image: registry.cn-hangzhou.aliyuncs.com/timelessmao/hub:gateway-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: aiops-runtime-config
            - secretRef:
                name: aiops-runtime-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-connector
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-connector
    app.kubernetes.io/part-of: aiops-sre-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-connector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-connector
        app.kubernetes.io/part-of: aiops-sre-agent
    spec:
      serviceAccountName: aiops-connector
      containers:
        - name: connector
          image: registry.cn-hangzhou.aliyuncs.com/timelessmao/hub:connectors-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: aiops-runtime-config
            - secretRef:
                name: aiops-runtime-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-hermes
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-hermes
    app.kubernetes.io/part-of: aiops-sre-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiops-hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiops-hermes
        app.kubernetes.io/part-of: aiops-sre-agent
    spec:
      containers:
        - name: hermes
          image: registry.cn-hangzhou.aliyuncs.com/timelessmao/hub:hermes-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: aiops-runtime-config
            - secretRef:
                name: aiops-runtime-secret
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aiops-hermes-data
---
