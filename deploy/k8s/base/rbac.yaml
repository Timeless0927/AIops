apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-connector
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-connector
    app.kubernetes.io/part-of: aiops-sre-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-connector
  namespace: aiops
  labels:
    app.kubernetes.io/name: aiops-connector
    app.kubernetes.io/part-of: aiops-sre-agent
subjects:
  - kind: ServiceAccount
    name: aiops-connector
    namespace: aiops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-connector
