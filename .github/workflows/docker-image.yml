name: docker-image

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-aiops-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: registry.cn-hangzhou.aliyuncs.com
      IMAGE_NAME: timelessmao/hub
      SMOKE_IMAGE: aiops-smoke:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=candidate-,enable=${{ github.event_name == 'push' && github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short

      - name: Build local AIOps image for smoke
        id: smoke-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aiops
          push: false
          tags: ${{ env.SMOKE_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          load: true

      - name: Run image import and facade smoke
        run: |
          docker run --rm \
            -e AIOPS_DATA_DIR=/tmp/aiops-smoke \
            -e HERMES_CONFIG=/tmp/aiops-smoke/missing-config.yaml \
            -e HERMES_HOME=/tmp/aiops-smoke/missing-home \
            --entrypoint python3 \
            "${SMOKE_IMAGE}" \
            -m runtime.image_smoke

      - name: Build and push AIOps image
        if: github.event_name == 'push'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aiops
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image
        if: github.event_name == 'push'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published AIOps image"
            echo
            echo "- Image: \`${IMAGE}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done <<< "${TAGS}"
            if [ -n "${DIGEST}" ]; then
              echo "- Digest: \`${DIGEST}\`"
              echo "- Pull by digest: \`${IMAGE}@${DIGEST}\`"
            else
              echo "- Digest: _not available_"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
