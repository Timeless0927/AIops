name: docker-image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-aiops-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AIOps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aiops
          push: false
          tags: aiops-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
