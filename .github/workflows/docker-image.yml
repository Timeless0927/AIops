name: docker-image

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-service-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: aiops
            target: aiops
            image: timelessmao/hub
            tag-prefix: ''
          - name: gateway
            target: gateway
            image: timelessmao/hub
            tag-prefix: gateway-
          - name: hermes
            target: hermes
            image: timelessmao/hub
            tag-prefix: hermes-
          - name: connectors
            target: connectors
            image: timelessmao/hub
            tag-prefix: connectors-
          - name: mcp-prometheus
            target: mcp-prometheus
            image: timelessmao/hub
            tag-prefix: mcp-prometheus-
          - name: mcp-loki
            target: mcp-loki
            image: timelessmao/hub
            tag-prefix: mcp-loki-
    env:
      REGISTRY: registry.cn-hangzhou.aliyuncs.com
      SMOKE_IMAGE: aiops-${{ matrix.service.name }}-smoke:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service.image }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.service.name == 'aiops' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ matrix.service.tag-prefix }}latest,enable=${{ matrix.service.name != 'aiops' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=branch,prefix=${{ matrix.service.tag-prefix }}candidate-,enable=${{ github.event_name == 'push' && github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short,prefix=${{ matrix.service.tag-prefix }}

      - name: Build local service image for smoke
        id: smoke-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aiops
          target: ${{ matrix.service.target }}
          push: false
          tags: ${{ env.SMOKE_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          load: true

      - name: Run image import and facade smoke
        if: matrix.service.name == 'aiops'
        run: |
          docker run --rm \
            -e AIOPS_DATA_DIR=/tmp/aiops-smoke \
            -e HERMES_CONFIG=/tmp/aiops-smoke/missing-config.yaml \
            -e HERMES_HOME=/tmp/aiops-smoke/missing-home \
            --entrypoint python3 \
            "${SMOKE_IMAGE}" \
            -m runtime.image_smoke

      - name: Run split service import smoke
        if: matrix.service.name != 'aiops'
        run: |
          docker run --rm \
            -e SERVICE_NAME="${{ matrix.service.name }}" \
            --entrypoint python3 \
            "${SMOKE_IMAGE}" \
            -m runtime.service_image_smoke

      - name: Log in to Aliyun Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push service image
        if: github.event_name == 'push'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aiops
          target: ${{ matrix.service.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published service image
        if: github.event_name == 'push'
        env:
          SERVICE: ${{ matrix.service.name }}
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.service.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published ${SERVICE} image"
            echo
            echo "- Image: \`${IMAGE}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "${tag}" ] && echo "  - \`${tag}\`"
            done <<< "${TAGS}"
            if [ -n "${DIGEST}" ]; then
              echo "- Digest: \`${DIGEST}\`"
              echo "- Pull by digest: \`${IMAGE}@${DIGEST}\`"
            else
              echo "- Digest: _not available_"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  smoke-service-compose:
    runs-on: ubuntu-latest
    needs: build-service-images
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run split service compose smoke
        run: |
          docker compose -f docker-compose.services.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from smoke \
            smoke
